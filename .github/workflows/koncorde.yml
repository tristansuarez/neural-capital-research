name: Bot de señales (Telegram)

on:
  workflow_dispatch:        # ejecucion manual desde la pestaña Actions
  schedule:
    - cron: '0 0 * * 1-5'   # 00:00 UTC, dias laborables

permissions:
  contents: write

jobs:
  escanear:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Escanear S&P 500 y publicar en Telegram
        continue-on-error: true
        run: python escaner_senales_telegram.py --telegram --sin-modelo

      - name: Señal de plata (reversión del par oro-plata)
        continue-on-error: true
        run: python senal_plata.py --telegram

      - name: Avisos de venta KONCORDE (indicador gira a la baja)
        continue-on-error: true
        run: python senal_ventas.py --telegram

      - name: Avisos de figuras técnicas (informativo, con veredicto histórico)
        continue-on-error: true
        run: python senal_figuras.py --telegram

      - name: Guardar registros (forward-test)
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add senales_log.csv ventas_log.csv senal_plata_log.csv figuras_log.csv tweets_hoy.txt || true
          git commit -m "Senales del dia (KONCORDE + plata)" || { echo "Sin cambios"; exit 0; }
          for i in 1 2 3 4 5; do
            git merge --abort 2>/dev/null || true
            git fetch origin main
            git merge -X ours --no-edit origin/main || true
            git push && { echo "Publicado"; exit 0; }
            echo "Conflicto de carrera, reintento $i..."; sleep 5
          done
          echo "No se pudo publicar tras varios intentos"; exit 1
