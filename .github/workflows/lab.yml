name: Laboratorio de modelos

on:
  workflow_dispatch:        # ejecucion manual desde la pestaña Actions
  push:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1-5'   # cada dia laborable a las 06:00 UTC

permissions:
  contents: write

jobs:
  correr-laboratorio:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr el laboratorio (datos reales)
        run: python run_lab.py

      - name: Publicar resultados.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resultados.json data_cache/*.csv || true
          git commit -m "Actualizar resultados del laboratorio" || { echo "Sin cambios"; exit 0; }
          for i in 1 2 3 4 5; do
            git merge --abort 2>/dev/null || true
            git fetch origin main
            git merge -X ours --no-edit origin/main || true
            git push && { echo "Publicado"; exit 0; }
            echo "Conflicto de carrera, reintento $i..."; sleep 5
          done
          echo "No se pudo publicar tras varios intentos"; exit 1
