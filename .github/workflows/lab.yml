name: Laboratorio de modelos

on:
  workflow_dispatch:        # ejecucion manual desde la pestaña Actions
  push:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1-5'   # cada dia laborable a las 06:00 UTC

permissions:
  contents: write

jobs:
  correr-laboratorio:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr el laboratorio (datos reales)
        run: python run_lab.py

      - name: Publicar resultados.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resultados.json data_cache/*.csv || true
          git commit -m "Actualizar resultados del laboratorio" || echo "Sin cambios"
          git push
